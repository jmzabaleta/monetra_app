[build]
  command = "bash scripts/netlify_build.sh"
  publish = "build/web"

[build.environment]
  FLUTTER_CHANNEL = "stable"
  FLUTTER_BASE_HREF = "/"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/flutter_service_worker.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
